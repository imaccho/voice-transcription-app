<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>掲示板 | VoiceSync（v2）</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=BIZ+UDPGothic:wght@400;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --sky:    #4A9FD4;
      --sky-l:  #7BBEE5;
      --sky-ll: #D6EDFA;
      --sky-bg: #EBF6FC;
      --mint:   #3DAA7A;
      --mint-ll:#D2F0E4;
      --mint-bg:#EBF7F2;
      --peach:  #F5845C;
      --peach-l:#FDDDD3;
      --ink:    #1E3A4A;
      --ink-70: rgba(30,58,74,0.7);
      --ink-40: rgba(30,58,74,0.4);
      --ink-12: rgba(30,58,74,0.12);
      --ink-06: rgba(30,58,74,0.06);
      --white:  #FFFFFF;
      --bg:     #F6FAFE;
      --font:   'BIZ UDPGothic', 'Noto Sans JP', sans-serif;
      --r:      14px;
      --r-lg:   22px;
    }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex; flex-direction: column;
      line-height: 1.8;
    }
    .ico { display: inline-flex; align-items: center; justify-content: center; }
    .ico svg { display: block; width: 100%; height: 100%; }

    /* ===== NAV ===== */
    nav {
      position: sticky; top: 0; z-index: 100;
      height: 68px; padding: 0 48px;
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(246,250,254,0.96);
      backdrop-filter: blur(16px);
      box-shadow: 0 1px 0 var(--ink-06);
    }
    .nav-left { display: flex; align-items: center; gap: 14px; }
    .nav-logo {
      display: flex; align-items: center; gap: 10px;
      text-decoration: none;
      font-family: 'Inter', sans-serif;
      font-size: 1.05rem; font-weight: 700; color: var(--ink);
    }
    .nav-logo-icon {
      width: 36px; height: 36px; border-radius: 11px;
      background: linear-gradient(135deg, var(--sky), #2d85b8);
      display: flex; align-items: center; justify-content: center; color: var(--white);
      box-shadow: 0 3px 10px rgba(74,159,212,0.35);
    }
    .nav-logo-icon .ico { width: 20px; height: 20px; }
    .ver-toggle {
      display: inline-flex; align-items: center;
      border: 1px solid var(--sky-ll); border-radius: 30px; overflow: hidden;
      font-family: 'Inter', sans-serif; font-size: 0.72rem; font-weight: 700;
    }
    .ver-toggle a, .ver-toggle span { padding: 5px 13px; text-decoration: none; transition: all 0.2s; }
    .ver-toggle .cur { background: var(--white); color: var(--sky); }
    .ver-toggle a { color: var(--ink-70); }
    .ver-toggle a:hover { color: var(--sky); }
    .nav-right {
      display: flex; align-items: center; gap: 16px;
    }
    .nav-user {
      display: flex; align-items: center; gap: 8px;
      font-size: 0.84rem; color: var(--ink-70);
    }
    .nav-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: linear-gradient(135deg, var(--sky), var(--mint));
      display: flex; align-items: center; justify-content: center;
      font-size: 0.8rem; font-weight: 700; color: var(--white);
      flex-shrink: 0;
    }
    .nav-email {
      max-width: 160px; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap;
    }
    .btn-logout {
      font-size: 0.8rem; font-weight: 700; color: var(--peach);
      background: var(--peach-l); border: 1px solid #FDDDD3;
      padding: 6px 14px; border-radius: 20px; cursor: pointer;
      font-family: var(--font);
      transition: all 0.2s;
    }
    .btn-logout:hover { background: #FAC8B8; }
    .nav-home {
      font-size: 0.82rem; color: var(--sky); text-decoration: none;
      font-weight: 700; transition: color 0.2s;
    }
    .nav-home:hover { color: #2d85b8; }

    /* ===== 認証中スピナー ===== */
    #auth-loading {
      flex: 1; display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 16px;
    }
    .spinner-lg {
      width: 40px; height: 40px; border-radius: 50%;
      border: 3px solid var(--sky-ll);
      border-top-color: var(--sky);
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #auth-loading p { font-size: 0.87rem; color: var(--ink-40); }

    /* ===== メインコンテンツ ===== */
    #board-content { display: none; flex: 1; }

    .board-wrap {
      max-width: 720px; margin: 0 auto; padding: 40px 24px 80px;
    }

    /* ページヘッダー */
    .board-header {
      margin-bottom: 32px;
    }
    .board-eyebrow {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 0.72rem; font-weight: 700; letter-spacing: 0.18em;
      text-transform: uppercase; color: var(--sky); margin-bottom: 12px;
    }
    .board-eyebrow .dot {
      width: 6px; height: 6px; border-radius: 50%; background: var(--sky);
    }
    .board-title-row { display: flex; align-items: center; gap: 14px; margin-bottom: 10px; }
    .board-title-icon {
      width: 52px; height: 52px; border-radius: 15px; flex-shrink: 0;
      background: linear-gradient(135deg, var(--sky-bg), var(--sky-ll));
      border: 1.5px solid var(--sky-ll); color: #2d7fb0;
    }
    .board-title-icon .ico { width: 28px; height: 28px; }
    .board-header h1 {
      font-size: 1.9rem; font-weight: 700; color: var(--ink);
    }
    .board-header p { font-size: 0.9rem; color: var(--ink-70); }

    /* 投稿フォーム */
    .post-form-card {
      background: var(--white);
      border: 1.5px solid var(--sky-ll);
      border-radius: var(--r-lg);
      padding: 24px;
      margin-bottom: 28px;
      box-shadow: 0 4px 20px rgba(74,159,212,0.08);
    }
    .post-form-label {
      font-size: 0.82rem; font-weight: 700; color: var(--ink);
      margin-bottom: 10px; display: flex; align-items: center; gap: 7px;
    }
    .post-form-label .ico { width: 17px; height: 17px; color: var(--sky); }
    .post-textarea {
      width: 100%; min-height: 96px;
      padding: 13px 15px;
      border: 1.5px solid var(--sky-ll); border-radius: var(--r);
      font-family: var(--font);
      font-size: 0.92rem; color: var(--ink);
      background: var(--sky-bg);
      resize: vertical; outline: none; line-height: 1.75;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .post-textarea:focus {
      border-color: var(--sky);
      box-shadow: 0 0 0 3px rgba(74,159,212,0.14);
      background: var(--white);
    }
    .post-textarea::placeholder { color: var(--ink-40); }
    .post-form-footer {
      display: flex; justify-content: space-between; align-items: center;
      margin-top: 12px;
    }
    .char-count { font-size: 0.76rem; color: var(--ink-40); }
    .char-count.warn { color: var(--peach); }
    .btn-post {
      background: linear-gradient(135deg, var(--sky), #2d85b8);
      color: var(--white); font-family: var(--font);
      font-size: 0.87rem; font-weight: 700;
      padding: 10px 24px; border: none; border-radius: 30px;
      cursor: pointer; transition: all 0.2s;
      box-shadow: 0 4px 14px rgba(74,159,212,0.3);
      display: flex; align-items: center; gap: 7px;
    }
    .btn-post:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(74,159,212,0.38); }
    .btn-post:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }
    .spinner-sm {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: var(--white); border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    /* アラート */
    .alert {
      padding: 10px 14px; border-radius: var(--r);
      font-size: 0.83rem; margin-bottom: 16px;
      display: none; align-items: center; gap: 8px;
    }
    .alert.error  { display: flex; background: #FFF0EE; border: 1px solid var(--peach-l); color: #C04030; }
    .alert.success{ display: flex; background: var(--mint-bg); border: 1px solid var(--mint-ll); color: #2a7a55; }

    /* 投稿一覧 */
    .posts-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px;
    }
    .posts-title {
      font-size: 1.02rem; font-weight: 700; color: var(--ink);
      display: flex; align-items: center; gap: 8px;
    }
    .posts-count {
      background: var(--sky-bg); border: 1px solid var(--sky-ll);
      color: var(--sky); font-size: 0.72rem; font-weight: 700;
      padding: 2px 10px; border-radius: 20px; font-family: 'Inter', sans-serif;
    }
    .btn-refresh {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 0.8rem; font-weight: 700; color: var(--sky); background: none;
      border: 1px solid var(--sky-ll); padding: 5px 12px; border-radius: 20px;
      cursor: pointer; transition: all 0.2s;
      font-family: var(--font);
    }
    .btn-refresh .ico { width: 15px; height: 15px; }
    .btn-refresh:hover { background: var(--sky-bg); }

    /* 投稿カード */
    #posts-list { display: flex; flex-direction: column; gap: 14px; }

    .post-card {
      background: var(--white);
      border: 1.5px solid var(--ink-06);
      border-radius: var(--r-lg); padding: 20px 20px 16px;
      box-shadow: 0 2px 10px rgba(30,58,74,0.05);
      transition: box-shadow 0.2s, border-color 0.2s;
      animation: fadeInUp 0.3s ease;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .post-card:hover { border-color: var(--sky-ll); box-shadow: 0 4px 18px rgba(74,159,212,0.1); }
    .post-card.own { border-color: rgba(61,170,122,0.25); }
    .post-card.own:hover { border-color: var(--mint-ll); }

    .post-meta {
      display: flex; align-items: center; gap: 10px; margin-bottom: 12px;
    }
    .post-avatar {
      width: 38px; height: 38px; border-radius: 50%; flex-shrink: 0;
      background: linear-gradient(135deg, var(--sky), var(--mint));
      display: flex; align-items: center; justify-content: center;
      font-size: 0.84rem; font-weight: 700; color: var(--white);
    }
    .post-avatar.own-av { background: linear-gradient(135deg, var(--mint), #2d8f60); }
    .post-meta-text { flex: 1; min-width: 0; }
    .post-author {
      font-size: 0.82rem; font-weight: 700; color: var(--ink);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .post-author .own-badge {
      display: inline-block; background: var(--mint-bg); color: var(--mint);
      font-size: 0.62rem; font-weight: 700; padding: 1px 6px; border-radius: 4px;
      margin-left: 6px; vertical-align: middle;
    }
    .post-time { font-size: 0.74rem; color: var(--ink-40); margin-top: 1px; }
    .btn-delete {
      background: none; border: none; cursor: pointer;
      font-size: 0.77rem; color: var(--ink-40); padding: 4px 8px;
      border-radius: 6px; transition: all 0.15s;
      font-family: var(--font);
      flex-shrink: 0;
    }
    .btn-delete:hover { background: var(--peach-l); color: var(--peach); }
    .post-body {
      font-size: 0.9rem; color: var(--ink); line-height: 1.85;
      white-space: pre-wrap; word-break: break-word;
    }

    /* ローディング/空状態 */
    .posts-loading, .posts-empty {
      text-align: center; padding: 48px 20px;
      color: var(--ink-40); font-size: 0.87rem;
    }
    .posts-empty .empty-icon {
      width: 56px; height: 56px; border-radius: 16px; margin: 0 auto 14px;
      background: var(--sky-bg); border: 1.5px solid var(--sky-ll); color: var(--sky);
    }
    .posts-empty .empty-icon .ico { width: 28px; height: 28px; }

    /* FOOTER */
    footer {
      background: var(--ink); padding: 32px 48px;
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 16px; margin-top: auto;
    }
    .footer-logo {
      display: flex; align-items: center; gap: 10px; text-decoration: none;
      font-family: 'Inter', sans-serif; font-size: 0.88rem; font-weight: 700;
      color: rgba(255,255,255,0.55);
    }
    .footer-logo-mark {
      width: 28px; height: 28px; border-radius: 8px;
      background: linear-gradient(135deg, var(--sky), #2d85b8);
      display: flex; align-items: center; justify-content: center; color: var(--white);
    }
    .footer-logo-mark .ico { width: 16px; height: 16px; }
    .footer-copy { font-size: 0.72rem; color: rgba(255,255,255,0.2); }

    @media (max-width: 600px) {
      nav { padding: 0 16px; }
      .nav-email { display: none; }
      .board-wrap { padding: 24px 16px 60px; }
      footer { padding: 24px 16px; flex-direction: column; text-align: center; }
    }
  </style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="nav-left">
    <a href="index-v2.html" class="nav-logo">
      <div class="nav-logo-icon"><span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2.5" width="6" height="11" rx="3"/><path d="M5.5 11a6.5 6.5 0 0 0 13 0"/><line x1="12" y1="17.5" x2="12" y2="21"/><line x1="8" y1="21" x2="16" y2="21"/></svg></span></div>
      VoiceSync
    </a>
    <div class="ver-toggle" title="デザインを切り替え"><a href="board.html">v1</a><span class="cur">v2</span></div>
  </div>
  <div class="nav-right">
    <a href="index-v2.html" class="nav-home">← トップ</a>
    <div class="nav-user" id="nav-user" style="display:none">
      <div class="nav-avatar" id="nav-avatar"></div>
      <span class="nav-email" id="nav-email"></span>
    </div>
    <button class="btn-logout" id="btn-logout" style="display:none" onclick="handleLogout()">ログアウト</button>
  </div>
</nav>

<!-- 認証確認中 -->
<div id="auth-loading">
  <div class="spinner-lg"></div>
  <p>認証を確認しています...</p>
</div>

<!-- 掲示板本体 -->
<div id="board-content">
  <div class="board-wrap">

    <!-- ヘッダー -->
    <div class="board-header">
      <div class="board-eyebrow"><span class="dot"></span>Members Only</div>
      <div class="board-title-row">
        <div class="board-title-icon ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="4" width="14" height="18" rx="2"/><rect x="9" y="2.5" width="6" height="3.5" rx="1"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="15" y2="16"/></svg></div>
        <h1>掲示板</h1>
      </div>
      <p>ログインメンバーだけが投稿・閲覧できる掲示板です。</p>
    </div>

    <!-- 投稿フォーム -->
    <div class="post-form-card">
      <label class="post-form-label"><span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 4.5l5 5L9 20H4v-5z"/><line x1="13" y1="6" x2="18" y2="11"/></svg></span>新しい投稿</label>
      <div class="alert" id="form-alert"></div>
      <textarea
        class="post-textarea"
        id="post-content"
        placeholder="メッセージを入力してください..."
        maxlength="500"
        oninput="updateCharCount()"
      ></textarea>
      <div class="post-form-footer">
        <span class="char-count" id="char-count">0 / 500</span>
        <button class="btn-post" id="btn-post" onclick="submitPost()">
          <span id="btn-post-label">投稿する</span>
        </button>
      </div>
    </div>

    <!-- 投稿一覧 -->
    <div class="posts-header">
      <div class="posts-title">
        投稿一覧
        <span class="posts-count" id="posts-count">0件</span>
      </div>
      <button class="btn-refresh" onclick="loadPosts()"><span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M20 11a8 8 0 1 0-1.9 5.2"/><polyline points="20 4 20 10 14 10"/></svg></span>更新</button>
    </div>

    <div id="posts-list">
      <div class="posts-loading">
        <div class="spinner-lg" style="margin:0 auto 12px"></div>
        読み込み中...
      </div>
    </div>
  </div>
</div>

<!-- FOOTER -->
<footer>
  <a href="index-v2.html" class="footer-logo">
    <div class="footer-logo-mark"><span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2.5" width="6" height="11" rx="3"/><path d="M5.5 11a6.5 6.5 0 0 0 13 0"/><line x1="12" y1="17.5" x2="12" y2="21"/><line x1="8" y1="21" x2="16" y2="21"/></svg></span></div>
    VoiceSync
  </a>
  <span class="footer-copy">© 2026 VoiceSync — 掲示板</span>
</footer>

<script>
  const SUPABASE_URL = 'https://juwkgkdhzlywcgaxyedc.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_v8WVOejfUy21WQM1kksxBQ_94lagLtS';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const ICON_WARN = '<span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3 2.5 20h19z"/><line x1="12" y1="10" x2="12" y2="14"/><line x1="12" y1="17.5" x2="12" y2="17.51"/></svg></span>';
  const ICON_CHAT = '<span class="ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5h16v11H9l-4 4V5z"/></svg></span>';

  let currentUser = null;

  // ===== 認証チェック =====
  async function init() {
    const { data, error } = await sb.auth.getSession();
    if (error || !data.session) {
      // 未ログイン → ログインページへ（戻り先を記録）
      window.location.href = 'login-v2.html?next=board-v2.html';
      return;
    }
    currentUser = data.session.user;
    showBoard();
  }

  function showBoard() {
    document.getElementById('auth-loading').style.display = 'none';
    document.getElementById('board-content').style.display = 'block';

    // ナビにユーザー情報を表示
    const initial = (currentUser.email || 'U')[0].toUpperCase();
    document.getElementById('nav-avatar').textContent = initial;
    document.getElementById('nav-email').textContent = currentUser.email;
    document.getElementById('nav-user').style.display = 'flex';
    document.getElementById('btn-logout').style.display = '';

    loadPosts();
  }

  // 認証タイムアウト（5秒）
  const authTimer = setTimeout(() => {
    window.location.href = 'login-v2.html?next=board-v2.html';
  }, 5000);

  init().then(() => clearTimeout(authTimer)).catch(() => {
    window.location.href = 'login-v2.html?next=board-v2.html';
  });

  // ===== ログアウト =====
  async function handleLogout() {
    await sb.auth.signOut();
    window.location.href = 'index-v2.html';
  }

  // ===== 文字数カウント =====
  function updateCharCount() {
    const len = document.getElementById('post-content').value.length;
    const el = document.getElementById('char-count');
    el.textContent = `${len} / 500`;
    el.className = 'char-count' + (len > 450 ? ' warn' : '');
  }

  // ===== 投稿一覧読み込み =====
  async function loadPosts() {
    const list = document.getElementById('posts-list');
    list.innerHTML = '<div class="posts-loading"><div class="spinner-lg" style="margin:0 auto 12px"></div>読み込み中...</div>';

    const { data, error } = await sb
      .from('posts')
      .select('*')
      .order('created_at', { ascending: false })
      .limit(100);

    if (error) {
      list.innerHTML = `<div class="posts-empty"><div class="empty-icon ico">${ICON_WARN}</div>投稿の読み込みに失敗しました。<br><small style="color:var(--peach)">${error.message}</small></div>`;
      return;
    }

    document.getElementById('posts-count').textContent = `${data.length}件`;

    if (data.length === 0) {
      list.innerHTML = `<div class="posts-empty"><div class="empty-icon ico">${ICON_CHAT}</div>まだ投稿がありません。<br>最初の投稿をしてみましょう！</div>`;
      return;
    }

    list.innerHTML = data.map(post => renderPost(post)).join('');
  }

  // ===== 投稿カードのHTML生成 =====
  function renderPost(post) {
    const isOwn = post.user_id === currentUser.id;
    const email = post.user_email || '匿名';
    const initial = email[0].toUpperCase();
    const time = formatTime(post.created_at);
    const content = escapeHtml(post.content);

    return `
      <div class="post-card ${isOwn ? 'own' : ''}" id="post-${post.id}">
        <div class="post-meta">
          <div class="post-avatar ${isOwn ? 'own-av' : ''}">${initial}</div>
          <div class="post-meta-text">
            <div class="post-author">
              ${escapeHtml(email)}
              ${isOwn ? '<span class="own-badge">自分</span>' : ''}
            </div>
            <div class="post-time">${time}</div>
          </div>
          ${isOwn ? `<button class="btn-delete" onclick="deletePost('${post.id}')">削除</button>` : ''}
        </div>
        <div class="post-body">${content}</div>
      </div>`;
  }

  // ===== 投稿する =====
  async function submitPost() {
    const textarea = document.getElementById('post-content');
    const content = textarea.value.trim();
    if (!content) return;

    const btn = document.getElementById('btn-post');
    const label = document.getElementById('btn-post-label');
    btn.disabled = true;
    label.innerHTML = '<span class="spinner-sm"></span>';
    showFormAlert(null);

    const { error } = await sb.from('posts').insert({
      user_id: currentUser.id,
      user_email: currentUser.email,
      content,
    });

    btn.disabled = false;
    label.textContent = '投稿する';

    if (error) {
      showFormAlert('error', '投稿に失敗しました: ' + error.message);
    } else {
      textarea.value = '';
      updateCharCount();
      loadPosts();
    }
  }

  // ===== 削除 =====
  async function deletePost(id) {
    if (!confirm('この投稿を削除しますか？')) return;
    const { error } = await sb.from('posts').delete().eq('id', id);
    if (error) {
      alert('削除に失敗しました: ' + error.message);
    } else {
      const el = document.getElementById('post-' + id);
      if (el) el.remove();
      const list = document.getElementById('posts-list');
      if (!list.querySelector('.post-card')) {
        list.innerHTML = `<div class="posts-empty"><div class="empty-icon ico">${ICON_CHAT}</div>まだ投稿がありません。</div>`;
      }
      const countEl = document.getElementById('posts-count');
      const n = parseInt(countEl.textContent) - 1;
      countEl.textContent = `${n}件`;
    }
  }

  // ===== アラート =====
  function showFormAlert(type, msg) {
    const el = document.getElementById('form-alert');
    if (!type) { el.className = 'alert'; return; }
    el.className = 'alert ' + type;
    el.textContent = msg;
  }

  // ===== ユーティリティ =====
  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  function formatTime(iso) {
    const d = new Date(iso);
    const now = new Date();
    const diff = (now - d) / 1000;
    if (diff < 60)  return 'たった今';
    if (diff < 3600) return `${Math.floor(diff / 60)}分前`;
    if (diff < 86400) return `${Math.floor(diff / 3600)}時間前`;
    return d.toLocaleDateString('ja-JP', { month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' });
  }

  // Enterキー（Shift+Enterで改行、Ctrl/Cmd+Enterで送信）
  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('post-content').addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
        e.preventDefault();
        submitPost();
      }
    });
  });
</script>
</body>
</html>
