<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログイン | VoiceSync</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;500;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --sky:    #4A9FD4;
      --sky-l:  #7BBEE5;
      --sky-ll: #D6EDFA;
      --sky-bg: #EBF6FC;
      --mint:   #3DAA7A;
      --mint-ll:#D2F0E4;
      --mint-bg:#EBF7F2;
      --peach:  #F5845C;
      --peach-l:#FDDDD3;
      --ink:    #1E3A4A;
      --ink-70: rgba(30,58,74,0.7);
      --ink-40: rgba(30,58,74,0.4);
      --white:  #FFFFFF;
      --bg:     #F6FAFE;
      --r:      14px;
      --r-lg:   22px;
    }
    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: var(--bg); color: var(--ink);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh; display: flex; flex-direction: column;
    }
    nav {
      height: 66px; padding: 0 48px;
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(246,250,254,0.95);
      backdrop-filter: blur(16px);
      box-shadow: 0 1px 0 rgba(30,58,74,0.06);
    }
    .nav-logo {
      display: flex; align-items: center; gap: 10px;
      text-decoration: none; font-family: 'Inter', sans-serif;
      font-size: 1rem; font-weight: 700; color: var(--ink);
    }
    .nav-logo-icon {
      width: 34px; height: 34px; border-radius: 10px;
      background: linear-gradient(135deg, var(--sky), #2d85b8);
      display: flex; align-items: center; justify-content: center; font-size: 1.1rem;
      box-shadow: 0 3px 10px rgba(74,159,212,0.35);
    }
    .nav-back { font-size: 0.82rem; color: var(--ink-70); text-decoration: none; transition: color 0.2s; }
    .nav-back:hover { color: var(--sky); }
    main {
      flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px;
    }
    .wrap { width: 100%; max-width: 440px; }
    .login-header { text-align: center; margin-bottom: 28px; }
    .logo-icon {
      width: 64px; height: 64px; border-radius: 18px;
      background: linear-gradient(135deg, var(--sky), #2d85b8);
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem; margin: 0 auto 14px;
      box-shadow: 0 8px 24px rgba(74,159,212,0.3);
    }
    .login-header h1 {
      font-family: 'Noto Serif JP', serif;
      font-size: 1.6rem; font-weight: 700; color: var(--ink); margin-bottom: 6px;
    }
    .login-header p { font-size: 0.85rem; color: var(--ink-70); }

    /* ログイン済みバナー（初期非表示） */
    #loggedin-banner {
      display: none;
      background: var(--mint-bg); border: 1.5px solid var(--mint-ll);
      border-radius: var(--r-lg); padding: 28px; text-align: center;
      margin-bottom: 20px;
    }
    #loggedin-banner .li-icon { font-size: 2rem; margin-bottom: 10px; }
    #loggedin-banner h3 {
      font-family: 'Noto Serif JP', serif;
      font-size: 1rem; font-weight: 700; color: var(--ink); margin-bottom: 6px;
    }
    #loggedin-email-txt { font-size: 0.83rem; color: var(--mint); font-weight: 600; margin-bottom: 20px; display: block; }
    .li-btns { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
    .btn-home {
      background: linear-gradient(135deg, var(--sky), #2d85b8);
      color: var(--white); font-size: 0.83rem; font-weight: 700;
      padding: 10px 22px; border-radius: 30px; text-decoration: none;
      box-shadow: 0 4px 14px rgba(74,159,212,0.3); transition: transform 0.2s;
    }
    .btn-home:hover { transform: translateY(-1px); }
    .btn-lo {
      background: var(--white); border: 1.5px solid var(--peach-l); color: var(--peach);
      font-size: 0.83rem; font-weight: 500; padding: 10px 22px; border-radius: 30px;
      cursor: pointer; font-family: 'Noto Sans JP', sans-serif; transition: background 0.2s;
    }
    .btn-lo:hover { background: var(--peach-l); }

    /* フォームエリア（常に表示） */
    #form-area {}
    .tabs {
      display: flex; background: var(--sky-bg);
      border: 1.5px solid var(--sky-ll); border-radius: 12px; padding: 4px; margin-bottom: 18px;
    }
    .tab {
      flex: 1; padding: 9px; border: none; border-radius: 9px;
      background: transparent; cursor: pointer;
      font-family: 'Noto Sans JP', sans-serif; font-size: 0.85rem; font-weight: 500; color: var(--ink-70);
      transition: all 0.2s;
    }
    .tab.active {
      background: var(--white); color: var(--sky); font-weight: 700;
      box-shadow: 0 2px 8px rgba(74,159,212,0.12);
    }
    .card {
      background: var(--white); border: 1.5px solid var(--sky-ll);
      border-radius: var(--r-lg); padding: 28px;
      box-shadow: 0 8px 32px rgba(74,159,212,0.09);
    }
    .fg { margin-bottom: 15px; }
    label { display: block; font-size: 0.78rem; font-weight: 700; color: var(--ink); margin-bottom: 6px; }
    input[type=email], input[type=password] {
      width: 100%; padding: 11px 14px;
      border: 1.5px solid var(--sky-ll); border-radius: var(--r);
      font-family: 'Noto Sans JP', sans-serif; font-size: 0.88rem; color: var(--ink);
      background: var(--white); outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus { border-color: var(--sky); box-shadow: 0 0 0 3px rgba(74,159,212,0.14); }
    input::placeholder { color: var(--ink-40); }
    .btn-sub {
      width: 100%; padding: 13px; border: none; border-radius: var(--r);
      background: linear-gradient(135deg, var(--sky), #2d85b8);
      font-family: 'Noto Sans JP', sans-serif; font-size: 0.9rem; font-weight: 700; color: var(--white);
      cursor: pointer; transition: all 0.22s;
      box-shadow: 0 4px 16px rgba(74,159,212,0.3);
      display: flex; align-items: center; justify-content: center; gap: 8px;
      margin-top: 4px;
    }
    .btn-sub:hover { transform: translateY(-1px); }
    .btn-sub:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 16px 0; color: var(--ink-40); font-size: 0.75rem;
    }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--sky-ll); }
    .btn-magic {
      width: 100%; padding: 11px; border: 1.5px solid var(--sky-ll); border-radius: var(--r);
      background: var(--sky-bg); font-family: 'Noto Sans JP', sans-serif;
      font-size: 0.84rem; font-weight: 500; color: var(--sky);
      cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-magic:hover { background: var(--sky-ll); }
    .btn-magic:disabled { opacity: 0.6; cursor: not-allowed; }
    .alert { padding: 11px 14px; border-radius: var(--r); font-size: 0.81rem; margin-bottom: 12px; display: none; gap: 8px; align-items: flex-start; }
    .alert.err  { display: flex; background: #FFF0EE; border: 1px solid var(--peach-l); color: #C04030; }
    .alert.ok   { display: flex; background: var(--mint-bg); border: 1px solid var(--mint-ll); color: #2a7a55; }
    .spin { display: inline-block; width: 15px; height: 15px; border: 2px solid rgba(255,255,255,0.4); border-top-color: var(--white); border-radius: 50%; animation: sp 0.7s linear infinite; }
    @keyframes sp { to { transform: rotate(360deg); } }
    .note { text-align: center; margin-top: 18px; font-size: 0.73rem; color: var(--ink-40); }
    .note a { color: var(--sky); text-decoration: none; }
    footer {
      background: var(--ink); padding: 26px 48px;
      display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px;
    }
    .fl { display: flex; align-items: center; gap: 10px; text-decoration: none; font-family: 'Inter', sans-serif; font-size: 0.85rem; font-weight: 700; color: rgba(255,255,255,0.5); }
    .flm { width: 26px; height: 26px; border-radius: 7px; background: linear-gradient(135deg, var(--sky), #2d85b8); display: flex; align-items: center; justify-content: center; font-size: 0.85rem; }
    .fc { font-size: 0.7rem; color: rgba(255,255,255,0.2); }
    @media (max-width: 600px) { nav { padding: 0 16px; } .card { padding: 20px; } footer { padding: 20px 16px; flex-direction: column; text-align: center; } }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo"><div class="nav-logo-icon">🎙</div>VoiceSync</a>
  <a href="index.html" class="nav-back">← トップに戻る</a>
</nav>

<main>
  <div class="wrap">
    <div class="login-header">
      <div class="logo-icon">🎙</div>
      <h1>VoiceSync</h1>
      <p>アカウントにログインして、すべての機能をご利用ください。</p>
    </div>

    <!-- ログイン済みの場合だけ表示（JS制御） -->
    <div id="loggedin-banner">
      <div class="li-icon">✅</div>
      <h3>ログイン済みです</h3>
      <span id="loggedin-email-txt"></span>
      <div class="li-btns">
        <a href="index.html" class="btn-home">🏠 トップへ戻る</a>
        <button class="btn-lo" onclick="doLogout()">ログアウト</button>
      </div>
    </div>

    <!-- フォームは常にHTMLで表示 → JSが制御するのはログイン済み時のみ -->
    <div id="form-area">
      <div class="tabs">
        <button class="tab active" id="t-login" onclick="switchTab('login')">ログイン</button>
        <button class="tab" id="t-signup" onclick="switchTab('signup')">新規登録</button>
      </div>

      <div class="card">
        <div class="alert" id="alert"></div>

        <form id="f-login" onsubmit="doLogin(event)">
          <div class="fg"><label>メールアドレス</label><input type="email" id="l-email" placeholder="your@email.com" required></div>
          <div class="fg"><label>パスワード</label><input type="password" id="l-pass" placeholder="••••••••" required minlength="6"></div>
          <button type="submit" class="btn-sub" id="b-login"><span id="b-login-lbl">ログイン</span></button>
        </form>

        <form id="f-signup" onsubmit="doSignup(event)" style="display:none">
          <div class="fg"><label>メールアドレス</label><input type="email" id="s-email" placeholder="your@email.com" required></div>
          <div class="fg"><label>パスワード（6文字以上）</label><input type="password" id="s-pass" placeholder="••••••••" required minlength="6"></div>
          <button type="submit" class="btn-sub" id="b-signup"><span id="b-signup-lbl">アカウントを作成</span></button>
        </form>

        <div class="divider">または</div>
        <button class="btn-magic" id="b-magic" onclick="doMagic()">✉️ マジックリンクでログイン（メール送信）</button>
      </div>
    </div>

    <p class="note">ログインすることで、<a href="#">利用規約</a>および<a href="#">プライバシーポリシー</a>に同意したものとみなします。</p>
  </div>
</main>

<footer>
  <a href="index.html" class="fl"><div class="flm">🎙</div>VoiceSync</a>
  <span class="fc">© 2026 VoiceSync</span>
</footer>

<script>
// ==============================
// Supabase は非同期で読み込む
// フォームは先に表示済み
// ==============================
const SB_URL = 'https://juwkgkdhzlywcgaxyedc.supabase.co';
const SB_KEY = 'sb_publishable_v8WVOejfUy21WQM1kksxBQ_94lagLtS';
let sb = null;

function getNextUrl() {
  return new URLSearchParams(window.location.search).get('next') || 'index.html';
}

// Supabase CDN を動的に読み込み、完了後にセッション確認
function loadSupabase() {
  return new Promise((resolve, reject) => {
    if (window.supabase) { resolve(window.supabase); return; }
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2';
    s.onload  = () => resolve(window.supabase);
    s.onerror = () => reject(new Error('Supabase CDN load failed'));
    document.head.appendChild(s);
  });
}

async function initAuth() {
  try {
    const supabaseLib = await loadSupabase();
    sb = supabaseLib.createClient(SB_URL, SB_KEY);

    const { data, error } = await sb.auth.getSession();
    if (!error && data?.session) {
      // ログイン済み → フォームを隠してバナー表示
      document.getElementById('form-area').style.display = 'none';
      document.getElementById('loggedin-email-txt').textContent = data.session.user.email;
      document.getElementById('loggedin-banner').style.display = 'block';
    }
    // 未ログインならフォームはそのまま表示済み
  } catch(e) {
    // CDN失敗 or エラー → フォームはそのまま、エラーは無視
    console.warn('Auth init failed (form still shown):', e);
  }
}

// ページ読み込み後に認証を確認（フォーム表示をブロックしない）
window.addEventListener('DOMContentLoaded', initAuth);

// ===== タブ切り替え =====
function switchTab(tab) {
  const isLogin = tab === 'login';
  document.getElementById('t-login').classList.toggle('active', isLogin);
  document.getElementById('t-signup').classList.toggle('active', !isLogin);
  document.getElementById('f-login').style.display  = isLogin ? '' : 'none';
  document.getElementById('f-signup').style.display = isLogin ? 'none' : '';
  clearAlert();
}

// ===== アラート =====
function showAlert(type, msg) {
  const el = document.getElementById('alert');
  el.className = 'alert ' + type;
  el.textContent = msg;
}
function clearAlert() { document.getElementById('alert').className = 'alert'; }

// ===== ボタンローディング =====
function setLoading(btnId, lblId, loading, label) {
  document.getElementById(btnId).disabled = loading;
  document.getElementById(lblId).innerHTML = loading ? '<span class="spin"></span>' : label;
}

// ===== ログイン =====
async function doLogin(e) {
  e.preventDefault();
  if (!sb) { showAlert('err', 'しばらく待ってから再試行してください。'); return; }
  clearAlert();
  setLoading('b-login', 'b-login-lbl', true);
  const { error } = await sb.auth.signInWithPassword({
    email: document.getElementById('l-email').value,
    password: document.getElementById('l-pass').value,
  });
  setLoading('b-login', 'b-login-lbl', false, 'ログイン');
  if (error) {
    showAlert('err', 'メールアドレスまたはパスワードが正しくありません。');
  } else {
    window.location.href = getNextUrl();
  }
}

// ===== 新規登録 =====
async function doSignup(e) {
  e.preventDefault();
  if (!sb) { showAlert('err', 'しばらく待ってから再試行してください。'); return; }
  clearAlert();
  setLoading('b-signup', 'b-signup-lbl', true);
  const { error } = await sb.auth.signUp({
    email: document.getElementById('s-email').value,
    password: document.getElementById('s-pass').value,
  });
  setLoading('b-signup', 'b-signup-lbl', false, 'アカウントを作成');
  if (error) {
    showAlert('err', error.message || '登録に失敗しました。');
  } else {
    showAlert('ok', '確認メールを送信しました。メールのリンクをクリックして登録を完了してください。');
  }
}

// ===== マジックリンク =====
async function doMagic() {
  if (!sb) { showAlert('err', 'しばらく待ってから再試行してください。'); return; }
  clearAlert();
  const email = document.getElementById('l-email').value || document.getElementById('s-email').value;
  if (!email) { showAlert('err', 'メールアドレスを入力してください。'); return; }
  const btn = document.getElementById('b-magic');
  btn.disabled = true; btn.textContent = '送信中...';
  const { error } = await sb.auth.signInWithOtp({ email });
  btn.disabled = false; btn.textContent = '✉️ マジックリンクでログイン（メール送信）';
  if (error) { showAlert('err', '送信失敗: ' + error.message); }
  else { showAlert('ok', `${email} にログインリンクを送信しました。`); }
}

// ===== ログアウト =====
async function doLogout() {
  if (sb) await sb.auth.signOut();
  document.getElementById('loggedin-banner').style.display = 'none';
  document.getElementById('form-area').style.display = '';
}
</script>
</body>
</html>
